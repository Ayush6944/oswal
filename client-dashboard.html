<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>Client ERP Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{margin:0;background:#f4f6fb;font-family:'Segoe UI';}

#sidebar{
width:220px;
height:100vh;
position:fixed;
background:#0f172a;
color:#fff;
padding:20px;
}

#sidebar h5{margin-bottom:30px;}

#sidebar a{
display:block;
color:#cbd5e1;
padding:10px;
text-decoration:none;
margin-bottom:8px;
border-radius:6px;
}

#sidebar a:hover{background:#1e40af;}

#content{
margin-left:220px;
padding:30px;
}

.card-box{
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
transition:0.3s;
text-align:center;
}

.card-box:hover{
transform:translateY(-5px);
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.old-price{
text-decoration:line-through;
color:#888;
font-size:14px;
}

.discount{
color:#16a34a;
font-weight:600;
}

.class-img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
margin-bottom:15px;
}
</style>
</head>

<body>

<div id="sidebar">
<h5>Client ERP</h5>
<a href="#" onclick="showClasses()">Shop Books</a>
<a href="cart.html">Cart</a>
<a href="tracking.html">My Orders</a>
<a href="invoice.html">Invoices</a>
<a href="index.html">Logout</a>
</div>

<div id="content">
<h4 id="pageTitle">Book Categories</h4>
<div class="row" id="bookContainer"></div>
</div>

<script src="erp-system.js"></script>

<script>

// ---------------- INVENTORY ----------------

const inventory=[];
const classes=[
"Class 1","Class 2","Class 3","Class 4","Class 5",
"Class 6","Class 7","Class 8","Class 9","Class 10",
"Class 11","Class 12"
];

const subjects=[
"English","Mathematics","Science",
"Physics","Chemistry","Biology",
"History","Geography","Computer"
];

classes.forEach(cls=>{
subjects.forEach(sub=>{
let price=Math.floor(Math.random()*800)+1200;
inventory.push({
class:cls,
name:cls+" "+sub,
price:price,
discountPrice:Math.floor(price*0.85)
});
});
});

// -------------- SHOW CLASSES --------------

function showClasses(){

document.getElementById("pageTitle").innerText="Book Categories";
const container=document.getElementById("bookContainer");
container.innerHTML="";

classes.forEach(cls=>{
container.innerHTML+=`
<div class="col-md-3 mb-4">
<div class="card-box">
<img src="https://images.unsplash.com/photo-1512820790803-83ca734da794"
class="class-img">
<h5>${cls}</h5>
<button class="btn btn-dark w-100 mt-3"
onclick="showSubjects('${cls}')">
Browse Books
</button>
</div>
</div>
`;
});
}

// -------------- SHOW SUBJECTS --------------

function showSubjects(selectedClass){

document.getElementById("pageTitle").innerText=
selectedClass+" Books";

const container=document.getElementById("bookContainer");
container.innerHTML="";

container.innerHTML+=`
<div class="mb-4">
<button class="btn btn-secondary"
onclick="showClasses()">← Back</button>
</div>
`;

let filtered=inventory.filter(b=>b.class===selectedClass);

filtered.forEach(book=>{
container.innerHTML+=`
<div class="col-md-3 mb-4">
<div class="card-box">
<h6>${book.name}</h6>

<p>
<span class="old-price">₹${book.price}</span>
<span class="discount ms-2">₹${book.discountPrice}</span>
</p>

<input type="number"
id="qty-${book.name}"
value="1" min="1"
class="form-control mb-2">

<button class="btn btn-primary w-100"
onclick="addToCart('${book.name}',${book.discountPrice})">
Add to Cart
</button>

</div>
</div>
`;
});
}

// Initial load
showClasses();

</script>

</body>
</html>
