<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>OSWAL ERP - Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:'Segoe UI';background:#f4f6fb;}
.sidebar{width:240px;height:100vh;position:fixed;background:#1e293b;color:#fff;padding:20px;}
.sidebar a{display:block;color:#cbd5e1;padding:10px;text-decoration:none;border-radius:6px;margin-bottom:5px;}
.sidebar a:hover,.active{background:#3b82f6;color:#fff;}
.main{margin-left:240px;padding:25px;}
.card{border:none;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,.05);}
.status-Pending{color:#f59e0b;font-weight:600;}
.status-Approved{color:#3b82f6;font-weight:600;}
.status-Shipped{color:#6366f1;font-weight:600;}
.status-Delivered{color:#16a34a;font-weight:600;}
</style>
</head>

<body>

<div class="sidebar">
<h4>OSWAL ERP</h4>
<a href="#" onclick="showSection('dashboard')" class="active">Dashboard</a>
<a href="#" onclick="showSection('orders')">Orders</a>
<a href="#" onclick="logout()">Logout</a>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard-section">

<h5>Admin Dashboard</h5>

<div class="row g-3 my-3">
<div class="col-md-3"><div class="card p-3"><h6>Total Orders</h6><h3 id="totalOrders">0</h3></div></div>
<div class="col-md-3"><div class="card p-3"><h6>Pending</h6><h3 id="pendingOrders">0</h3></div></div>
<div class="col-md-3"><div class="card p-3"><h6>Delivered</h6><h3 id="deliveredOrders">0</h3></div></div>
<div class="col-md-3"><div class="card p-3"><h6>Revenue</h6><h3 id="totalRevenue">₹0</h3></div></div>
</div>

<canvas id="salesChart"></canvas>

</div>

<!-- ORDERS -->
<div id="orders-section" style="display:none;">

<h5>Manage Orders</h5>

<table class="table mt-3">
<thead>
<tr>
<th>ID</th>
<th>Client</th>
<th>Total</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="orderTable"></tbody>
</table>

</div>

</div>

<script>

if(localStorage.getItem("erp_logged_in")!=="true"){
window.location.href="index.html";
}

let orders=JSON.parse(localStorage.getItem("erp_orders"))||[];

function save(){
localStorage.setItem("erp_orders",JSON.stringify(orders));
}

function renderDashboard(){
let total=orders.length;
let pending=0;
let delivered=0;
let revenue=0;

orders.forEach(o=>{
if(o.status==="Pending") pending++;
if(o.status==="Delivered"){ delivered++; revenue+=parseInt(o.total);}
});

document.getElementById("totalOrders").innerText=total;
document.getElementById("pendingOrders").innerText=pending;
document.getElementById("deliveredOrders").innerText=delivered;
document.getElementById("totalRevenue").innerText="₹"+revenue;

new Chart(document.getElementById("salesChart"),{
type:"bar",
data:{
labels:orders.map(o=>o.id),
datasets:[{label:"Revenue",data:orders.map(o=>o.total),backgroundColor:"#3b82f6"}]
}
});
}

function renderOrders(){
let table=document.getElementById("orderTable");
table.innerHTML="";

orders.forEach(o=>{

let actionBtn="";

if(o.status==="Pending"){
actionBtn=`<button class="btn btn-sm btn-primary" onclick="updateStatus(${o.id},'Approved')">Approve</button>`;
}
else if(o.status==="Approved"){
actionBtn=`<button class="btn btn-sm btn-warning" onclick="updateStatus(${o.id},'Shipped')">Ship</button>`;
}
else if(o.status==="Shipped"){
actionBtn=`<button class="btn btn-sm btn-success" onclick="updateStatus(${o.id},'Delivered')">Deliver</button>`;
}
else{
actionBtn="-";
}

table.innerHTML+=`
<tr>
<td>${o.id}</td>
<td>${o.client}</td>
<td>₹${o.total}</td>
<td class="status-${o.status}">${o.status}</td>
<td>${actionBtn}</td>
</tr>`;
});
}

function updateStatus(id,newStatus){
let order=orders.find(o=>o.id===id);
if(order){
order.status=newStatus;
save();
renderOrders();
renderDashboard();
}
}

function showSection(section){
document.getElementById("dashboard-section").style.display="none";
document.getElementById("orders-section").style.display="none";
document.getElementById(section+"-section").style.display="block";
}

function logout(){
localStorage.clear();
window.location.href="index.html";
}

renderDashboard();
renderOrders();

</script>

</body>
</html>
