<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>Cart | OSWAL ERP</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
body{background:#f4f6fb;font-family:'Segoe UI';}

.cart-card{
  background:#fff;
  border-radius:10px;
  padding:20px;
  box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

.qty-btn{
  width:30px;
  height:30px;
  border:none;
  background:#e5e7eb;
}

.summary-box{
  background:#fff;
  border-radius:10px;
  padding:20px;
  box-shadow:0 4px 15px rgba(0,0,0,0.05);
}
</style>
</head>

<body class="container py-4">

<h4 class="mb-4">Shopping Cart</h4>

<div class="row">

  <!-- LEFT SIDE CART ITEMS -->
  <div class="col-md-8">
    <div id="cartItems"></div>
  </div>

  <!-- RIGHT SIDE SUMMARY -->
  <div class="col-md-4">
    <div class="summary-box">
      <h5>Order Summary</h5>
      <hr>
      <p>Subtotal: ₹<span id="subtotal">0</span></p>
      <p>Discount (15%): - ₹<span id="discount">0</span></p>
      <h5>Total: ₹<span id="cartTotal">0</span></h5>

      <button class="btn btn-success w-100 mt-3"
        onclick="goToPayment()">
        Proceed to Payment
      </button>
    </div>
  </div>

</div>

<script src="erp-system.js"></script>
<script>

// ===== PROFESSIONAL CART RENDER =====

function renderCart(){

  const container = document.getElementById("cartItems");
  if(!container) return;

  container.innerHTML="";
  let subtotal=0;

  if(cart.length===0){
    container.innerHTML="<p>Your cart is empty</p>";
    document.getElementById("subtotal").innerText=0;
    document.getElementById("discount").innerText=0;
    document.getElementById("cartTotal").innerText=0;
    return;
  }

  cart.forEach((item,index)=>{

    let itemTotal=item.price*item.qty;
    subtotal+=itemTotal;

    container.innerHTML+=`
      <div class="cart-card mb-3">
        <div class="d-flex justify-content-between align-items-center">

          <div>
            <h6>${item.name}</h6>
            <p class="text-muted">₹${item.price}</p>

            <div class="d-flex align-items-center">
              <button class="qty-btn"
                onclick="changeQty(${index},-1)">-</button>
              <span class="mx-3">${item.qty}</span>
              <button class="qty-btn"
                onclick="changeQty(${index},1)">+</button>
            </div>
          </div>

          <div class="text-end">
            <h6>₹${itemTotal}</h6>
            <button class="btn btn-sm btn-outline-danger"
              onclick="removeFromCart(${index})">
              <i class="bi bi-trash"></i>
            </button>
          </div>

        </div>
      </div>
    `;
  });

  let discount=Math.floor(subtotal*0.15);
  let finalTotal=subtotal-discount;

  document.getElementById("subtotal").innerText=subtotal;
  document.getElementById("discount").innerText=discount;
  document.getElementById("cartTotal").innerText=finalTotal;

  localStorage.setItem("erp_total",finalTotal);
}

// ===== CHANGE QTY =====

function changeQty(index,value){
  cart[index].qty+=value;
  if(cart[index].qty<1) cart[index].qty=1;
  saveCart();
  renderCart();
}

renderCart();

</script>

</body>
</html>
