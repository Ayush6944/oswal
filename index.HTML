<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSWAL Publication ERP</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  height:100vh;
  background:#f4f6fb;
}

.login-wrapper{
  height:100vh;
  display:flex;
}

.left-panel{
  flex:1;
  background:linear-gradient(135deg,#1e293b,#3b82f6);
  color:#fff;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:40px;
}

.left-panel h1{
  font-weight:700;
  font-size:32px;
}

.left-panel p{
  opacity:0.9;
  margin-top:10px;
}

.right-panel{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-box{
  width:350px;
}

.login-box h4{
  font-weight:600;
  margin-bottom:25px;
}

.form-control{
  height:45px;
}

.login-btn{
  height:45px;
  font-weight:600;
}

#errorMessage{
  display:none;
  color:red;
  margin-bottom:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="login-wrapper">

  <!-- LEFT SIDE -->
  <div class="left-panel">
    <i class="bi bi-book-half" style="font-size:60px;"></i>
    <h1 class="mt-3">OSWAL ERP</h1>
    <p>Publication Sales & Distribution Management System</p>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right-panel">
    <div class="login-box">
      <h4>Sign in to your account</h4>

      <div id="errorMessage"></div>

      <form id="loginForm">
        <input type="email" id="email" class="form-control mb-3" placeholder="Email Address" required>
        <input type="password" id="password" class="form-control mb-3" placeholder="Password" required>
        <button type="submit" class="btn btn-primary w-100 login-btn">
          <i class="bi bi-box-arrow-in-right me-2"></i>Login
        </button>
      </form>
    </div>
  </div>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
  e.preventDefault();

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    showError("All fields are required");
    return;
  }

  const role = detectRole(email);

  if(!role){
    showError("Invalid company email domain");
    return;
  }

  localStorage.setItem("erp_logged_in", "true");
  localStorage.setItem("erp_user_email", email);
  localStorage.setItem("erp_user_role", role);

  if(role === "Admin"){
    window.location.href = "admin-dashboard.html";
  }
  else if(role === "Client"){
    window.location.href = "client-dashboard.html";
  }
  else{
    window.location.href = "admin-dashboard.html";
  }
});

function detectRole(email){
  if(email.endsWith("@admin.com")) return "Admin";
  if(email.endsWith("@client.com")) return "Client";
  if(email.endsWith("@publisher.com")) return "Publisher";
  if(email.endsWith("@distributor.com")) return "Distributor";
  if(email.endsWith("@retailer.com")) return "Retailer";
  if(email.endsWith("@employee.com")) return "Employee";
  return null;
}

function showError(msg){
  const box = document.getElementById("errorMessage");
  box.innerText = msg;
  box.style.display = "block";
}
</script>

</body>
</html>
